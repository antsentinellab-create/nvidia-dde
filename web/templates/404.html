{% extends "base.html" %}

{% block title %}找不到頁面 - DSS 設計審查系統{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2 class="card-title" style="color: var(--danger);">🔍 404 - 找不到頁面</h2>
    </div>
    
    <div class="alert alert-warning">
        <p>{{ message or '您訪問的頁面不存在' }}</p>
    </div>
    
    <div class="mt-20 text-center">
        <a href="/" class="btn">返回首頁</a>
    </div>
</div>
{% endblock %}
